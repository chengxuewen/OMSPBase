# deny.toml — AUDESYS dependency audit (cargo-deny 0.20+)

[advisories]
version = 2
# ponytail: vulnerability + unmaintained keys removed in 0.20 — advisory checks are on by default
yanked = "deny"
ignore = ["RUSTSEC-2022-0004", "RUSTSEC-2025-0025"]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "LGPL-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
