services:
  server:
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - cargo-cache:/workspace/target
    ports:
      - "9800:9800"
      - "40000-40100:40000-40100/udp"
    environment:
      - RUST_LOG=debug
    command: cargo run --bin omspbase-server

volumes:
  cargo-cache: