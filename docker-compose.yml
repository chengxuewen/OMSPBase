services:
  server:
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - cargo-cache:/workspace/target
    ports:
      - "9800:9800"
      - "40000-40100:40000-40100/udp"
    environment:
      - RUST_LOG=debug
    command: cargo run --bin omspbase-server
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "2G"

volumes:
  cargo-cache: