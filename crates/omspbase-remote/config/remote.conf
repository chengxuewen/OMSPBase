# OMSPBase Remote Configuration
# Copy to /opt/oomspbase/etc/remote.conf and customize

remote:
  id: "remote-001"            # Unique remote station ID
  name: ""                    # Human-readable name (optional)

signaling:
  ws_url: "ws://localhost:9100/ws"   # Server signaling WebSocket
  # psk: "omspbase-dev"             # Pre-shared key (default: "omspbase-dev")

media:
  # display: "HDMI-1"         # Output display (optional, default: system default)
  width: 1280                 # Viewport width
  height: 720                 # Viewport height
  format: "BGRA"              # Output pixel format
  fullscreen: false           # Fullscreen mode
  # decoder: "nvh264dec"      # Preferred decoder (optional, default: autodetect)

# TURN/STUN relay (optional, required for NAT traversal)
# turn:
#   urls: "turn:relay.example.com:3478"
#   username: "remote-user"
#   credential: "secure-credential"

# Control settings (DataChannel — vehicle/robot teleop)
# control:
#   hmac_key: "omspbase-control"    # HMAC signing key
#   rate_hz: 30                      # Max control send rate (Hz)

# Web config UI
# web:
#   bind: "0.0.0.0:9101"     # Config UI listen address
#   username: "admin"         # Basic auth user (optional)
#   password: "secret"        # Basic auth password (optional)
