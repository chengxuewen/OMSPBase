# OMSPBase Server configuration
# Default path: /opt/oomspbase/etc/server.conf

server:
  # Unique server instance ID
  id: "server-001"

web:
  # HTTP + WebSocket bind address
  bind: "0.0.0.0:9801"

relay:
  # Maximum rooms (0 = unlimited)
  max_rooms: 100
  # Maximum remotes per room
  max_remotes_per_room: 50
  # Peer timeout in seconds (idle disconnect)
  peer_timeout_secs: 60

